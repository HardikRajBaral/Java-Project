# Development Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/auction_db_dev
spring.datasource.username=your_username
spring.datasource.password=your_password

# Show SQL in development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable H2 console for development (if using H2)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# Development JWT secret (use a stronger one in production)
jwt.secret=devSecretKey123456789012345678901234567890

# MySQL dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect